<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <!-- Brand Icon -->
  <g transform="translate(5, 0)">
    <!-- Outer gold diamond -->
    <rect x="15" y="15" width="30" height="30" transform="rotate(45 30 30)" fill="none" stroke="#c2a478" stroke-width="2" />
    <!-- Inner dark diamond -->
    <rect x="17.5" y="17.5" width="25" height="25" transform="rotate(45 30 30)" fill="#1a1a1a" />
    <!-- Elegant Monogram H -->
    <path d="M 25,23 L 25,37 M 35,23 L 35,37 M 25,30 L 35,30" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Brand Text -->
  <text x="65" y="31" font-family="'Playfair Display', 'Georgia', serif" font-size="26" font-weight="700" fill="#1a1a1a" letter-spacing="2">HALLE</text>
  <text x="65" y="47" font-family="'Montserrat', 'Inter', sans-serif" font-size="11" font-weight="600" fill="#c2a478" letter-spacing="5.5">SALATIGA</text>
</svg>
